name: Deploy

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed

jobs:
  docker_deploy:
    name: Build and push Docker image
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, linux, x64]
    environment: docker

    steps:
      - name: Checkout repozitorija
        uses: actions/checkout@v5

      - name: Prenesi artefakt iz workflow Test
        uses: actions/download-artifact@v4
        with:
          name: test-check-artifacts
          path: preneseno/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Preveri datoteko napaka.txt
        shell: bash
        run: |
          echo "Vsebina napaka.txt:"
          cat preneseno/napaka.txt || true

          if [ -s preneseno/napaka.txt ]; then
            echo "Testni workflow je ustvaril napako, deploy se prekine."
            exit 1
          fi

      - name: Preveri Docker
        shell: bash
        run: |
          docker --version

      - name: Prijava v Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Nastavi Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in push Docker slike
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:latest
